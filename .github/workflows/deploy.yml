name: Deploy Download Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy static files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.github' \
            . \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/nivx/playtime/download-site/

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
